name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: to-clipboard
            package: to-clipboard-linux-x86_64
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: to-clipboard.exe
            package: to-clipboard-windows-x86_64
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            binary: to-clipboard
            package: to-clipboard-macos-x86_64
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: to-clipboard
            package: to-clipboard-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Package Linux assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          chmod +x packaging/package-linux.sh
          packaging/package-linux.sh \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "$version" \
            "${{ matrix.target }}" \
            dist
          cd dist
          sha256sum * > SHA256SUMS-${{ matrix.name }}.txt

      - name: Package Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $packageRoot = "${{ matrix.package }}-$version"
          New-Item -ItemType Directory -Path "dist", "$packageRoot", "$packageRoot\bin", "$packageRoot\share\doc\to-clipboard" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "$packageRoot\bin\to-clipboard.exe"
          Copy-Item "README.md" "$packageRoot\share\doc\to-clipboard\README.md"
          Copy-Item "LICENSE" "$packageRoot\share\doc\to-clipboard\LICENSE"
          Copy-Item "Docs\en.md" "$packageRoot\share\doc\to-clipboard\DOCUMENTATION.md"
          Compress-Archive -Path $packageRoot -DestinationPath "dist\$packageRoot.zip"
          Get-FileHash "dist\$packageRoot.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -NoNewline "dist\SHA256SUMS-${{ matrix.name }}.txt"

      - name: Package macOS asset
        if: runner.os == 'macOS'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_root="${{ matrix.package }}-$version"
          mkdir -p "dist" "$package_root/bin" "$package_root/share/doc/to-clipboard"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$package_root/bin/to-clipboard"
          cp README.md "$package_root/share/doc/to-clipboard/README.md"
          cp LICENSE "$package_root/share/doc/to-clipboard/LICENSE"
          cp Docs/en.md "$package_root/share/doc/to-clipboard/DOCUMENTATION.md"
          tar -czf "dist/${package_root}.tar.gz" "$package_root"
          cd dist
          shasum -a 256 * > SHA256SUMS-${{ matrix.name }}.txt

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
