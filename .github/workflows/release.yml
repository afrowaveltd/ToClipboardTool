name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: to-clipboard
            asset: to-clipboard-linux-x86_64
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: to-clipboard.exe
            asset: to-clipboard-windows-x86_64.exe
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            binary: to-clipboard
            asset: to-clipboard-macos-x86_64
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: to-clipboard
            asset: to-clipboard-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          chmod +x packaging/package-linux.sh
          packaging/package-linux.sh \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "$version" \
            "${{ matrix.target }}" \
            dist
          sha256sum dist/* > "dist/${{ matrix.name }}-packages.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
            dist/*
