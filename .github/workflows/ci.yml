name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test and lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt -- --check

      - name: Run tests
        run: cargo test --locked

      - name: Run clippy
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
